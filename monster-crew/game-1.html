<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Squad: Collector's Edition</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --panel-color: #302b63;
            --accent-color: #24243e;
            --text-color: #ff0055;
            --gold-color: #ffd700;
            --health-color: #ff4b2b;
            --human-color: #3498db;
            --undead-color: #9b59b6;
            --monster-color: #2ecc71;
            --modal-bg: rgba(0, 0, 0, 0.9);
        }

        .icon-img.coin-bag{
            width:3.25rem;
            height:3.25rem;
        }

        .icon-img {
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/background.jpg') center/cover no-repeat;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            width: 1100px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* STATS BAR */
        header {
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--text-color);
        }

        .stat { font-size: 1.4em; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #player-hp { color: var(--health-color); }
        #player-gold { color: var(--gold-color); }

        /* PLAY AREA */
        main { display: flex; flex-direction: column; flex: 1; }

        #battle-view {
            flex: 2;
            background: url('images/background2.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }
        #battle-view::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 0;
        }
        #battle-view > div {
            z-index: 1;
        }

        .shake { animation: shake 0.2s ease-in-out; }

        #squad-view, #shop-view {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
        }

        #shop-view { border-top: 1px solid rgba(255,255,255,0.1); }

        /* MONSTER CARDS */
        .slot {
            width: 130px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slot.filled { box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .slot:hover { transform: scale(1.05); border-color: var(--text-color); }

        .card {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 8px; box-sizing: border-box;
        }

        .card-image { width: 100%; height: 80px; object-fit: contain; margin: 10px 0; }
        .card-stats {
            display: flex; justify-content: space-between;
            margin-top: auto; font-weight: bold; font-size: 1.1em;
        }
        .c-atk { color: var(--gold-color); }
        .c-hp { color: var(--health-color); }

        /* INSPECTOR MODAL */
        #inspector {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            perspective: 1500px;
        }

        .inspector-inner {
            width: 450px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .inspector-front, .inspector-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backface-visibility: hidden;
            background: var(--accent-color);
            border-radius: 20px;
            border: 4px solid var(--text-color);
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .inspector-front {
            padding: 30px;
            align-items: center;
        }

        .inspector-back {
            transform: rotateY(180deg);
            padding: 30px;
            text-align: center;
            justify-content: center;
        }

        .ins-type { text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 10px; }
        .ins-image { width: 140px; height: 140px; object-fit: contain; margin: 20px auto; display: block; }
        .ins-effect { color: var(--gold-color); font-style: italic; margin: 20px 0; line-height: 1.6; }
        .ins-flavor { color: #888; font-size: 0.9em; border-top: 1px solid #444; padding-top: 15px; }

        /* CONTROLS */
        #controls {
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: 0.2s;
        }

        .btn-main { background: var(--text-color); color: white; }
        .btn-main:hover { transform: scale(1.1); filter: brightness(1.2); }
        .btn-sec { background: #444; color: white; }

        /* ANIMATIONS */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card-level {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--gold-color);
            color: black;
            font-weight: bold;
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 5px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .card-cost {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-color);
            color: black;
            font-weight: bold;
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 5px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .card-tier {
            position: absolute;
            top: -10px;
            left: -10px;
            color: black;
            font-weight: bold;
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 5px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 10;
            text-transform: uppercase;
        }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 2em;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 500;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -100px); }
        }

        @keyframes clashRight {
            0% { transform: translateX(0); }
            50% { transform: translateX(50px) scale(1.1); z-index: 10; border-color: var(--health-color); }
            100% { transform: translateX(0); }
        }
        @keyframes clashLeft {
            0% { transform: translateX(0); }
            50% { transform: translateX(-50px) scale(1.1); z-index: 10; border-color: var(--health-color); }
            100% { transform: translateX(0); }
        }
        .clash-right { animation: clashRight 0.5s ease-in-out; }
        .clash-left { animation: clashLeft 0.5s ease-in-out; }

        @keyframes defeatEffect {
            0% { transform: scale(1) rotate(0deg); filter: grayscale(0) brightness(1); opacity: 1; }
            50% { transform: scale(0.9) rotate(-10deg); filter: grayscale(1) brightness(0.5); opacity: 0.8; }
            100% { transform: scale(0.5) rotate(15deg) translateY(50px); filter: grayscale(1) brightness(0); opacity: 0; }
        }
        @keyframes popSkull {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .defeated { animation: defeatEffect 0.5s ease-out forwards !important; pointer-events: none; }
        .defeated::after {
            content: "💀";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            animation: popSkull 0.5s forwards;
            z-index: 100;
        }

        /* BATTLE RESULT MODAL */
        #battle-result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .result-inner {
            background: var(--panel-color);
            border: 4px solid var(--gold-color);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-inner h1 {
            font-size: 3em;
            margin: 0 0 20px 0;
            color: var(--gold-color);
            text-shadow: 2px 2px 0px #000;
        }

        .result-inner p {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: white;
        }

        /* COIN SHOWER */
        .coin-particle {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 2001;
            background-image: url('images/bag1.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* CHARACTER SELECT MODAL */
        #character-select-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(8px);
        }

        .char-card {
            background: var(--panel-color);
            border: 3px solid #555;
            border-radius: 15px;
            padding: 20px;
            width: 180px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .char-card:hover {
            transform: scale(1.05);
            border-color: var(--text-color);
            box-shadow: 0 0 20px rgba(255,0,85,0.4);
        }

        .char-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .char-title {
            color: var(--gold-color);
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .char-desc {
            font-size: 0.9em;
            color: white;
        }

        /* LOBBY DRAWER */
        #shop-phase {
            display: flex;
            flex: 1;
            width: 100%;
        }

        #character-drawer {
            width: 100px;
            background: rgba(0,0,0,0.6);
            border-left: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 10px;
            overflow-y: auto;
        }

        .drawer-char {
            position: relative;
            text-align: center;
            padding: 10px 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 8px;
            width: 80px;
            transition: 0.3s;
        }

        .drawer-char.is-player {
            border-color: var(--gold-color);
            background: rgba(255, 215, 0, 0.1);
        }

        .drawer-icon {
            font-size: 2.2em;
            position: relative;
            margin-bottom: 5px;
        }

        .skull-overlay {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            opacity: 0.6;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .drawer-char.dead .skull-overlay {
            display: block;
        }

        .drawer-char.dead {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .drawer-name {
            font-size: 0.7em;
            color: white;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .drawer-hp {
            color: var(--health-color);
            font-weight: bold;
            font-size: 1em;
        }

        .drawer-hp .dead-text {
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div class="stat" id="round-display">ROUND 1</div>
            <div class="stat" id="player-hp"><img src="images/hp.png" class="icon-img"> 20</div>
            <div class="stat" id="player-gold"><img src="images/bag1.png" class="icon-img" style="transform: scale(1.5); margin-right: 5px;"> <img src="images/win-icon.png" class="icon-img"> 15</div>
        </header>

        <main>
            <div id="battle-view" style="display: none;">
                <div id="combat-info" style="position: absolute; top: 20px; text-align: center; z-index: 10;"></div>
                <div id="enemy-line" style="display:flex; gap:15px; margin-bottom:40px;"></div>
                <div id="ally-line" style="display:flex; gap:15px;"></div>
            </div>

            <div id="shop-phase">
                <div style="display: flex; flex-direction: column; flex: 1;">
                    <div id="squad-view">
                        <div class="slot" onclick="inspectSlot('squad', 0, this)"></div>
                        <div class="slot" onclick="inspectSlot('squad', 1, this)"></div>
                        <div class="slot" onclick="inspectSlot('squad', 2, this)"></div>
                        <div class="slot" onclick="inspectSlot('squad', 3, this)"></div>
                        <div class="slot" onclick="inspectSlot('squad', 4, this)"></div>
                    </div>

                    <div id="shop-view">
                        <img src="images/demon.png" alt="Shopkeeper" style="height: 180px; object-fit: contain; margin-right: 20px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));">
                        <div class="slot" onclick="inspectSlot('shop', 0, this)" oncontextmenu="buyMonster(0); return false;"></div>
                        <div class="slot" onclick="inspectSlot('shop', 1, this)" oncontextmenu="buyMonster(1); return false;"></div>
                        <div class="slot" onclick="inspectSlot('shop', 2, this)" oncontextmenu="buyMonster(2); return false;"></div>
                    </div>
                </div>

                <div id="character-drawer">
                    <!-- Drawer characters rendering -->
                </div>
            </div>
        </main>

        <footer id="controls">
            <button class="btn-sec" onclick="rerollShop()">Reroll (1<img src="images/win-icon.png" class="icon-img">)</button>
            <button class="btn-main" id="btn-battle" onclick="startBattle()">Fight!</button>
        </footer>
    </div>

    <div id="inspector" onclick="closeInspector()">
        <div class="inspector-inner" id="inspector-inner" onclick="event.stopPropagation()">
            <div class="inspector-front">
                <div class="card-tier" id="ins-front-tier" style="font-size: 1.5em; padding: 10px 20px; top: -15px; left: -15px;">E</div>
                <div class="card-level" id="ins-front-level" style="font-size: 1.5em; padding: 10px 20px; top: -15px; right: -15px;">1</div>
                <img id="ins-front-image" src="" alt="Monster" style="width: 100%; height: 60%; object-fit: contain; margin: auto 0;">
                <div class="card-stats" style="width: 100%; font-size: 2.5em; display: flex; justify-content: space-between; margin-top: auto;">
                    <span class="c-atk" id="ins-front-atk">⚔️ 0</span>
                    <span class="c-hp" id="ins-front-hp"><img src="images/hp.png" class="icon-img"> 0</span>
                </div>
            </div>
            <div class="inspector-back">
                <div id="ins-type" class="ins-type">Human</div>
                <h1 id="ins-name" style="margin: 10px 0;">Soldier</h1>
                <img id="ins-image" class="ins-image" src="" alt="Monster Inspector Image" style="margin: 10px auto; max-height: 120px;">
                <div id="ins-stats" style="font-size: 2em; font-weight: bold;">
                    <span class="c-atk" id="ins-atk">2</span> / <span class="c-hp" id="ins-hp">3</span>
                </div>
                <div id="ins-effect" class="ins-effect">TEAM: +1/+1 for each Human.</div>
                <div id="ins-flavor" class="ins-flavor">He just wants to go home and nap.</div>
                
                <div id="ins-actions" style="margin-top: auto; display:flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-main" id="ins-buy-btn">BUY (5<img src="images/win-icon.png" class="icon-img">)</button>
                    <button class="btn-sec" id="ins-sac-btn">SACRIFICE</button>
                    <button class="btn-sec" id="ins-merge-btn" style="background: var(--gold-color); color: black;">MERGE</button>
                    <button class="btn-sec" onclick="closeInspector()">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="battle-result-modal">
        <div class="result-inner">
            <h1 id="battle-result-title">VICTORY!</h1>
            <p id="battle-result-desc">You gained 11<img src="images/win-icon.png" class="icon-img">!</p>
            <button class="btn-main" onclick="closeBattleResult()">CONTINUE</button>
        </div>
    </div>

    <div id="character-select-modal">
        <div class="result-inner" style="width: auto; max-width: 90%;">
            <h1 style="color: var(--gold-color); font-size: 2.5em; margin-bottom: 30px;">CHOOSE YOUR HERO</h1>
            <div id="character-list" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                <!-- Cards inserted by JS -->
            </div>
        </div>
    </div>

    <script>
        /**
         * MONSTER REGISTRY (The Backbone)
         */
        const MONSTER_REGISTRY = [
            { id: "m1", name: "Buff Bear", image: "images/bear-buff.png", tier: "E", type: "monster", atk: 3, hp: 4, cost: 5, 
              effectDesc: "TEAM: +1 ATK and +1 HP for every other Monster ally.", 
              flavor: "He never skips leg day or arm day." },
            
            { id: "m2", name: "Dead Hand", image: "images/deady-hand.png", tier: "E", type: "undead", atk: 4, hp: 1, cost: 5, 
              effectDesc: "AFTER: Give a random ally +3 HP when this dies.", 
              flavor: "Need a hand?" },

            { id: "m3", name: "Slime Dagger", image: "images/slime-daggers.png", tier: "D", type: "monster", atk: 2, hp: 2, cost: 5, 
              effectDesc: "SOLO: +3 ATK and +2 HP if it's the only Monster.", 
              flavor: "Sharp AND gooey." },

            { id: "m4", name: "Giant Teeth", image: "images/giant-teeth.png", tier: "C", type: "undead", atk: 4, hp: 6, cost: 8, 
              effectDesc: "TEAM: +2 HP for every other Undead ally.", 
              flavor: "Being dead is no excuse for poor dental hygiene." },

            { id: "m5", name: "Bear Shirt", image: "images/bear-shirt.png", tier: "B", type: "monster", atk: 6, hp: 4, cost: 8, 
              effectDesc: "SOLO: +4 ATK if no other monsters present.", 
              flavor: "Just a bear wearing a neat shirt." },

            { id: "m6", name: "Slime Sword", image: "images/slime-sword.png", tier: "A", type: "monster", atk: 8, hp: 8, cost: 12, 
              effectDesc: "TEAM: All Monsters gain +2/+2 at start of battle.", 
              flavor: "A legendary blade that leaves a sticky residue." },
              
            { id: "m7", name: "Buff Wolf", image: "images/wolf-buff.png", tier: "B", type: "human", atk: 5, hp: 5, cost: 8, 
              effectDesc: "TEAM: All Humans gain +1/+1 at start of battle.", 
              flavor: "Gains. That's it." },
              
            { id: "m8", name: "Wolf Jacket", image: "images/wolf-jacket.png", tier: "D", type: "human", atk: 3, hp: 2, cost: 5, 
              effectDesc: "SOLO: +2 ATK if it's the only Human.", 
              flavor: "Cool guys don't look at explosions." },
              
            { id: "m9", name: "Slime Glasses", image: "images/slime-glasses.png", tier: "C", type: "monster", atk: 1, hp: 5, cost: 5, 
              effectDesc: "TEAM: Shop items cost 1 less.", 
              flavor: "He's very smart. He reads books." },
              
            { id: "m10", name: "Living Lightning", image: "images/living-lighting.png", tier: "A", type: "undead", atk: 6, hp: 2, cost: 12, 
              effectDesc: "AFTER: Deal 3 damage to random enemy when this dies.", 
              flavor: "Pure energy, entirely shocking." }
        ];

        const TIER_NAMES = ["E", "D", "C", "B", "A"];
        const TIER_COLORS = { "E": "#b0bec5", "D": "#8bc34a", "C": "#29b6f6", "B": "#ab47bc", "A": "#ffa000" };

        let state = {
            round: 1, gold: 10, hp: 20, 
            squad: [null, null, null, null, null],
            shop: [null, null, null],
            isPaused: false,
            currentlyInspecting: null,
            character: null,
            characters: null,
            currentOpponent: null
        };

        const CHARACTERS = [
            { id: "beast", name: "Beastmaster", desc: "Higher chance for Monster units.", typeWeights: { monster: 60, undead: 20, human: 20 }, icon: "🐻" },
            { id: "necro", name: "Necromancer", desc: "Higher chance for Undead units.", typeWeights: { monster: 20, undead: 60, human: 20 }, icon: "💀" },
            { id: "captain", name: "Commander", desc: "Higher chance for Human units.", typeWeights: { monster: 20, undead: 20, human: 60 }, icon: "⚔️" },
            { id: "collector", name: "Collector", desc: "Equal chances for all units.", typeWeights: "equal", icon: "🃏" }
        ];

        function renderCharacterSelection() {
            const list = document.getElementById('character-list');
            list.innerHTML = '';
            CHARACTERS.forEach(char => {
                const div = document.createElement('div');
                div.className = 'char-card';
                div.innerHTML = `
                    <div class="char-icon">${char.icon}</div>
                    <div class="char-title">${char.name}</div>
                    <div class="char-desc">${char.desc}</div>
                `;
                div.onclick = () => selectCharacter(char);
                list.appendChild(div);
            });
        }

        function selectCharacter(char) {
            state.character = char;
            state.hp = 20;
            state.characters = CHARACTERS.map(c => ({
                id: c.id,
                name: c.name,
                icon: c.icon,
                hp: 20
            }));
            document.getElementById('character-select-modal').style.display = 'none';
            refreshShop();
            updateUI();
        }

        let battleData = { ally: [], enemy: [] };

        /**
         * CORE ENGINE
         */
        function init() {
            renderCharacterSelection();
            document.getElementById('character-select-modal').style.display = 'flex';
            updateUI();
        }

        function getWeightedRandomTier(round) {
            const weightsArray = [
                [100, 0, 0, 0, 0],       // Round 1
                [70, 30, 0, 0, 0],       // Round 2
                [50, 40, 10, 0, 0],      // Round 3
                [40, 35, 25, 0, 0],      // Round 4
                [30, 35, 25, 10, 0],     // Round 5
                [20, 30, 30, 15, 5],     // Round 6
                [10, 25, 35, 20, 10],    // Round 7
                [5, 15, 35, 30, 15],     // Round 8
                [0, 10, 30, 40, 20],     // Round 9
                [0, 0, 20, 50, 30],      // Round 10+
            ];
            const idx = Math.min(round - 1, 9);
            const weights = weightsArray[idx];
            
            const rand = Math.random() * 100;
            let sum = 0;
            for (let i = 0; i < 5; i++) {
                sum += weights[i];
                if (rand <= sum) return TIER_NAMES[i];
            }
            return "E";
        }

        function refreshShop() {
            state.shop = state.shop.map(() => {
                let tier = getWeightedRandomTier(state.round);
                let pool = MONSTER_REGISTRY.filter(m => m.tier === tier);
                // Fallback in case a tier has no monsters
                while (pool.length === 0) {
                    let idx = TIER_NAMES.indexOf(tier);
                    if (idx > 0) tier = TIER_NAMES[idx - 1];
                    else break;
                    pool = MONSTER_REGISTRY.filter(m => m.tier === tier);
                }

                let selectedMonster;
                if (!state.character || state.character.typeWeights === "equal") {
                    selectedMonster = pool[Math.floor(Math.random() * pool.length)];
                } else {
                    let totalWeight = 0;
                    let weightedPool = pool.map(m => {
                        let w = state.character.typeWeights[m.type] || 10;
                        totalWeight += w;
                        return { monster: m, weight: w };
                    });

                    let rand = Math.random() * totalWeight;
                    let sum = 0;
                    for(let item of weightedPool) {
                        sum += item.weight;
                        if(rand <= sum) {
                            selectedMonster = item.monster;
                            break;
                        }
                    }
                    if(!selectedMonster) selectedMonster = pool[0];
                }

                return { ...selectedMonster, instId: Math.random() };
            });
            updateUI();
        }

        function rerollShop() {
            if (state.gold >= 1) {
                state.gold--;
                refreshShop();
            }
        }

        /**
         * INSPECTOR & MODAL LOGIC
         */
        function inspectSlot(type, index, element) {
            const monster = type === 'shop' ? state.shop[index] : state.squad[index];
            if (!monster) return;

            openInspector(monster, type, index, element);
        }

        function openInspector(monster, type, index, element) {
            state.currentlyInspecting = { monster, type, index };
            state.isPaused = true;

            const lvl = monster.level || 1;
            const atk = monster.cAtk !== undefined ? monster.cAtk : monster.atk;
            const hp = monster.cHp !== undefined ? monster.cHp : monster.hp;

            // Fill Front
            document.getElementById('ins-front-level').innerText = `${lvl}`;
            document.getElementById('ins-front-image').src = monster.image;
            document.getElementById('ins-front-tier').innerText = monster.tier || "E";
            document.getElementById('ins-front-tier').style.background = TIER_COLORS[monster.tier] || "#b0bec5";
            document.getElementById('ins-front-atk').innerHTML = `⚔️ ${atk}`;
            document.getElementById('ins-front-hp').innerHTML = `<img src="images/hp.png" class="icon-img"> ${hp}`;

            // Fill Back
            document.getElementById('ins-type').innerText = monster.type;
            document.getElementById('ins-name').innerText = monster.name;
            document.getElementById('ins-image').src = monster.image;
            document.getElementById('ins-atk').innerText = atk;
            document.getElementById('ins-hp').innerText = hp;
            document.getElementById('ins-effect').innerText = monster.effectDesc;
            document.getElementById('ins-flavor').innerText = `"${monster.flavor}"`;

            // Buttons
            const buyBtn = document.getElementById('ins-buy-btn');
            const sacBtn = document.getElementById('ins-sac-btn');
            const mergeBtn = document.getElementById('ins-merge-btn');

            let discount = state.squad.filter(m => m && m.id === "m9").length;
            let currentCost = type === 'shop' ? Math.max(0, monster.cost - discount) : monster.cost;

            buyBtn.style.display = type === 'shop' ? 'block' : 'none';
            buyBtn.innerHTML = `BUY (${currentCost}<img src="images/win-icon.png" class="icon-img">)`;
            buyBtn.onclick = () => buyMonster(index);

            sacBtn.style.display = type === 'squad' ? 'block' : 'none';
            sacBtn.onclick = () => sacrificeMonster(index);

            let canMerge = false;
            let mergeTargets = [];
            if (type === 'squad') {
                for (let i = 0; i < state.squad.length; i++) {
                    const sm = state.squad[i];
                    if (sm && sm.id === monster.id && (sm.level || 1) === lvl && i !== index) {
                        mergeTargets.push(i);
                    }
                }
                if (mergeTargets.length >= 2) canMerge = true;
            }
            mergeBtn.style.display = canMerge ? 'block' : 'none';
            mergeBtn.onclick = () => mergeMonster(index, mergeTargets.slice(0, 2));

            // Animation
            const inspector = document.getElementById('inspector');
            const inner = document.getElementById('inspector-inner');
            
            inspector.style.display = 'flex';
            inspector.style.opacity = '0';
            
            if (element) {
                const rect = element.getBoundingClientRect();
                const scaleX = rect.width / 450;
                const tx = (rect.left + rect.width / 2) - (window.innerWidth / 2);
                const ty = (rect.top + rect.height / 2) - (window.innerHeight / 2);
                
                inner.style.transition = 'none';
                inner.style.transform = `translate(${tx}px, ${ty}px) scale(${scaleX}) rotateY(0deg)`;
                
                // Force reflow
                void inner.offsetWidth;
            } else {
                inner.style.transition = 'none';
                inner.style.transform = 'scale(0.5) rotateY(0deg)';
                void inner.offsetWidth;
            }
            
            inspector.style.transition = 'opacity 0.3s';
            inspector.style.opacity = '1';
            
            inner.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            inner.style.transform = 'translate(0, 0) scale(1) rotateY(180deg)';
        }

        function closeInspector() {
            const inspector = document.getElementById('inspector');
            const inner = document.getElementById('inspector-inner');
            
            inspector.style.opacity = '0';
            inner.style.transform = 'scale(0.8) rotateY(180deg)';
            
            setTimeout(() => {
                inspector.style.display = 'none';
                state.isPaused = false;
                state.currentlyInspecting = null;
            }, 300);
        }

        function buyMonster(index) {
            const monster = state.shop[index];
            if (!monster) return;
            let discount = state.squad.filter(m => m && m.id === "m9").length;
            let currentCost = Math.max(0, monster.cost - discount);
            if (state.gold >= currentCost) {
                const emptyIdx = state.squad.indexOf(null);
                if (emptyIdx !== -1) {
                    state.gold -= currentCost;
                    state.squad[emptyIdx] = { ...monster, cAtk: monster.atk, cHp: monster.hp };
                    state.shop[index] = null;
                    closeInspector();
                    updateUI();
                } else { alert("Squad full!"); }
            } else { alert("Not enough gold!"); }
        }

        function sacrificeMonster(index) {
            const sacrificed = state.squad[index];
            state.squad[index] = null;
            state.gold += 2; // Refund 2 gold
            
            if (sacrificed.id === "m2") {
                const allies = state.squad.filter(m => m !== null);
                if (allies.length > 0) {
                    const randomAlly = allies[Math.floor(Math.random() * allies.length)];
                    randomAlly.hp += 3;
                    if (randomAlly.cHp !== undefined) randomAlly.cHp += 3;
                }
            }

            closeInspector();
            updateUI();
        }

        function mergeMonster(index, targets) {
            const mainMonster = state.squad[index];
            const m1 = state.squad[targets[0]];
            const m2 = state.squad[targets[1]];
            
            mainMonster.atk += m1.atk + m2.atk;
            mainMonster.hp += m1.hp + m2.hp;
            mainMonster.level = (mainMonster.level || 1) + 1;
            mainMonster.cAtk = mainMonster.atk;
            mainMonster.cHp = mainMonster.hp;
            
            state.squad[targets[0]] = null;
            state.squad[targets[1]] = null;
            
            closeInspector();
            updateUI();
        }

        /**
         * BATTLE SYSTEM
         */
        function startBattle() {
            if (state.squad.every(s => s === null)) return alert("Need a squad!");
            
            document.getElementById('battle-view').style.display = 'flex';
            document.getElementById('shop-phase').style.display = 'none';
            document.getElementById('controls').style.display = 'none';

            let opponents = state.characters ? state.characters.filter(c => c.id !== state.character?.id && c.hp > 0) : [];
            if (opponents.length > 0) {
                state.currentOpponent = opponents[Math.floor(Math.random() * opponents.length)];
            } else {
                state.currentOpponent = null;
            }

            const combatInfo = document.getElementById('combat-info');
            if (combatInfo) {
                if (state.currentOpponent) {
                    combatInfo.innerHTML = `
                        <h2 style="color: var(--gold-color); text-shadow: 2px 2px 0 #000; margin: 0 0 5px 0;">VS ${state.currentOpponent.name}</h2>
                        <div style="font-size: 1.5em; color: var(--health-color); font-weight: bold; text-shadow: 1px 1px 0 #000;">
                            ${state.currentOpponent.icon} <img src="images/hp.png" class="icon-img"> ${state.currentOpponent.hp}
                        </div>
                    `;
                    combatInfo.style.display = 'block';
                } else {
                    combatInfo.style.display = 'none';
                }
            }

            // Clone squad and generate enemies
            battleData.ally = state.squad.filter(s => s !== null).map(s => ({ ...s, cHp: s.hp, cAtk: s.atk }));
            battleData.enemy = [0,1].map(() => {
                const m = MONSTER_REGISTRY[Math.floor(Math.random() * MONSTER_REGISTRY.length)];
                return { ...m, cHp: m.hp, cAtk: m.atk };
            });

            renderBattle();
            setTimeout(battleStep, 1000);
        }

        function battleStep() {
            if (state.isPaused) {
                setTimeout(battleStep, 100);
                return;
            }

            if (battleData.ally.length === 0 || battleData.enemy.length === 0) {
                endBattle();
                return;
            }

            const a = battleData.ally[0];
            const e = battleData.enemy[0];

            const allyFront = document.getElementById('ally-line').children[0];
            const enemyFront = document.getElementById('enemy-line').children[0];

            if (allyFront) allyFront.classList.add('clash-right');
            if (enemyFront) enemyFront.classList.add('clash-left');

            setTimeout(() => {
                // Visual Damage
                showEffect('ally-line', `-${e.cAtk}`, 'var(--health-color)');
                showEffect('enemy-line', `-${a.cAtk}`, 'var(--health-color)');
                document.getElementById('battle-view').classList.add('shake');
                setTimeout(() => document.getElementById('battle-view').classList.remove('shake'), 200);

                a.cHp -= e.cAtk;
                e.cHp -= a.cAtk;

                let delay = 0;

                if (a.cHp <= 0 && allyFront) {
                    allyFront.classList.remove('clash-right');
                    allyFront.classList.add('defeated');
                    delay = 500;
                }
                if (e.cHp <= 0 && enemyFront) {
                    enemyFront.classList.remove('clash-left');
                    enemyFront.classList.add('defeated');
                    delay = 500;
                }

                setTimeout(() => {
                    let triggerM2Ally = false;
                    let triggerM2Enemy = false;

                    if (a.cHp <= 0) {
                        const dead = battleData.ally.shift();
                        if (dead.id === "m2") triggerM2Ally = true;
                    }
                    if (e.cHp <= 0) {
                        const dead = battleData.enemy.shift();
                        if (dead.id === "m2") triggerM2Enemy = true;
                    }

                    renderBattle();

                    if (triggerM2Ally) handleAfterDeathEffect('ally');
                    if (triggerM2Enemy) handleAfterDeathEffect('enemy');
                }, delay);

            }, 500);

            setTimeout(battleStep, 2500);
        }

        function handleAfterDeathEffect(side) {
            const targets = side === 'ally' ? battleData.ally : battleData.enemy;
            if (targets.length > 0) {
                targets[0].cHp += 3;
                showEffect(side === 'ally' ? 'ally-line' : 'enemy-line', `+3 HP`, 'var(--monster-color)');
            }
        }

        function endBattle() {
            const win = battleData.ally.length > 0;
            let hpLoss = 0;
            let opponentHpLoss = 0;

            if (!win) {
                const aliveMonsters = battleData.enemy.length;
                hpLoss = state.round + aliveMonsters;
                state.hp -= hpLoss;
                if (state.hp <= 0) state.hp = 0;
                
                if (state.characters) {
                    let pChar = state.characters.find(c => c.id === state.character.id);
                    if (pChar) pChar.hp = state.hp;
                }
            } else {
                if (state.currentOpponent) {
                    const aliveMonsters = battleData.ally.length;
                    opponentHpLoss = state.round + aliveMonsters;
                    
                    let op = state.characters.find(c => c.id === state.currentOpponent.id);
                    if (op) {
                        op.hp -= opponentHpLoss;
                        if (op.hp <= 0) op.hp = 0;
                    }
                }
            }
            
            if (state.characters) {
                let bystanders = state.characters.filter(c => c.id !== state.character?.id && c.id !== state.currentOpponent?.id && c.hp > 0);
                
                for (let i = 0; i < bystanders.length; i += 2) {
                    if (i + 1 < bystanders.length) {
                        let loser = Math.random() < 0.5 ? bystanders[i] : bystanders[i + 1];
                        loser.hp -= (state.round + Math.floor(Math.random() * 3));
                        if (loser.hp <= 0) loser.hp = 0;
                    }
                }
            }

            state.round++;
            const earnedGold = 10 + state.round;
            state.gold = earnedGold;
            
            const modal = document.getElementById('battle-result-modal');
            const title = document.getElementById('battle-result-title');
            const desc = document.getElementById('battle-result-desc');
            
            modal.style.display = 'flex';
            const btn = modal.querySelector('button');

            const isPlayerDead = state.hp <= 0;
            let areOthersDead = false;
            if (state.characters) {
                const aliveOthers = state.characters.filter(c => c.id !== state.character?.id && c.hp > 0);
                if (aliveOthers.length === 0) areOthersDead = true;
            }

            if (isPlayerDead) {
                title.innerText = "GAME OVER";
                title.style.color = 'var(--health-color)';
                desc.innerText = `You lost all your HP...`;
                btn.innerText = "RESTART";
                btn.onclick = () => location.reload();
            } else if (areOthersDead) {
                title.innerText = "CHAMPION!";
                title.style.color = 'var(--gold-color)';
                desc.innerText = `You defeated all competitors!`;
                btn.innerText = "PLAY AGAIN";
                btn.onclick = () => location.reload();
                createCoinShower();
            } else {
                btn.innerText = "CONTINUE";
                btn.onclick = closeBattleResult;
                if (win) {
                    title.innerText = "VICTORY!";
                    title.style.color = 'var(--gold-color)';
                    let opText = "";
                    if (state.currentOpponent && opponentHpLoss > 0) {
                        opText = `<br><span style="color:var(--text-color); font-size:0.8em; margin-top:10px; display:inline-block;">${state.currentOpponent.name} lost ${opponentHpLoss}<img src="images/hp.png" class="icon-img">!</span>`;
                    }
                    desc.innerHTML = `You gained ${earnedGold}<img src="images/win-icon.png" class="icon-img">!${opText}`;
                    createCoinShower();
                } else {
                    title.innerText = "DEFEAT!";
                    title.style.color = 'var(--health-color)';
                    desc.innerHTML = `You lost ${hpLoss}<img src="images/hp.png" class="icon-img">!`;
                }
            }
        }

        function createCoinShower() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const coin = document.createElement('div');
                    coin.className = 'coin-particle';
                    coin.style.left = Math.random() * 100 + 'vw';
                    coin.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                    document.body.appendChild(coin);
                    setTimeout(() => coin.remove(), 2500);
                }, Math.random() * 1000);
            }
        }

        function closeBattleResult() {
            document.getElementById('battle-result-modal').style.display = 'none';
            document.getElementById('battle-view').style.display = 'none';
            document.getElementById('shop-phase').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            
            refreshShop();
            updateUI();
        }

        /**
         * VISUALS
         */
        function showEffect(containerId, text, color) {
            const container = document.getElementById(containerId);
            const target = container.children.length > 0 ? container.children[0] : container;
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.color = color;
            el.style.left = "50%";
            target.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('round-display').innerText = `ROUND ${state.round}`;
            document.getElementById('player-hp').innerHTML = `<img src="images/hp.png" class="icon-img"> ${state.hp}`;
            document.getElementById('player-gold').innerHTML = `<img src="images/bag1.png" class="coin-bag icon-img" style="transform: scale(1.5); margin-right: 5px;"> <img src="images/win-icon.png" class="icon-img"> ${state.gold}`;

            // Render Slots
            const squadSlots = document.querySelectorAll('#squad-view .slot');
            state.squad.forEach((m, i) => renderCard(squadSlots[i], m));

            const shopSlots = document.querySelectorAll('#shop-view .slot');
            state.shop.forEach((m, i) => renderCard(shopSlots[i], m, true));

            // Render Drawer
            if (state.characters && document.getElementById('character-drawer')) {
                const drawer = document.getElementById('character-drawer');
                drawer.innerHTML = '';
                state.characters.forEach(c => {
                    const isPlayer = state.character && c.id === state.character.id;
                    const isDead = c.hp <= 0;
                    const hpText = isDead ? '<span class="dead-text">DEAD</span>' : `<img src="images/hp.png" class="icon-img"> ${c.hp}`;

                    drawer.innerHTML += `
                        <div class="drawer-char ${isPlayer ? 'is-player' : ''} ${isDead ? 'dead' : ''}">
                            <div class="drawer-icon">
                                ${c.icon}
                                <div class="skull-overlay">💀</div>
                            </div>
                            <span class="drawer-name">${c.name}</span>
                            <div class="drawer-hp">${hpText}</div>
                        </div>
                    `;
                });
            }
        }

        function renderCard(slot, m, isShop = false) {
            slot.innerHTML = '';
            slot.classList.toggle('filled', !!m);
            if (!m) return;
            const lvl = m.level || 1;
            const tierStr = m.tier || "E";
            const tierColor = TIER_COLORS[tierStr] || "#b0bec5";
            let discount = state.squad.filter(sm => sm && sm.id === "m9").length;
            let currentCost = isShop ? Math.max(0, m.cost - discount) : m.cost;
            slot.innerHTML = `
                ${isShop ? `<div class="card-cost">${currentCost}<img src="images/win-icon.png" class="icon-img" style="width:1em;height:1em;"></div>` : ''}
                <div class="card-tier" style="background: ${tierColor};">${tierStr}</div>
                <div class="card-level">${lvl}</div>
                <div class="card">
                    <img src="${m.image}" alt="${m.name}" class="card-image">
                    <div class="card-stats">
                        <span class="c-atk">⚔️ ${m.atk}</span>
                        <span class="c-hp"><img src="images/hp.png" class="icon-img"> ${m.hp}</span>
                    </div>
                </div>
            `;
        }

        function renderBattle() {
            const allyLine = document.getElementById('ally-line');
            const enemyLine = document.getElementById('enemy-line');
            allyLine.innerHTML = ''; enemyLine.innerHTML = '';

            battleData.ally.forEach(m => {
                const div = document.createElement('div');
                div.className = 'slot filled';
                div.onclick = function() {
                    // Custom inspect for battle
                    inspectMonsterOnly(m, this);
                }
                renderCard(div, { ...m, atk: m.cAtk, hp: m.cHp });
                allyLine.appendChild(div);
            });

            battleData.enemy.forEach(m => {
                const div = document.createElement('div');
                div.className = 'slot filled';
                div.onclick = function() {
                    inspectMonsterOnly(m, this);
                }
                renderCard(div, { ...m, atk: m.cAtk, hp: m.cHp });
                enemyLine.appendChild(div);
            });
        }

        function inspectMonsterOnly(m, element) {
            openInspector(m, 'battle', null, element);
        }

        init();
    </script>
</body>
</html>
