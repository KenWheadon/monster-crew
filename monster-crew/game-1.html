<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Squad: Collector's Edition</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --panel-color: #302b63;
            --accent-color: #24243e;
            --text-color: #ff0055;
            --gold-color: #ffd700;
            --health-color: #ff4b2b;
            --human-color: #3498db;
            --undead-color: #9b59b6;
            --monster-color: #2ecc71;
            --modal-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/background.jpg') center/cover no-repeat;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            width: 1100px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* STATS BAR */
        header {
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--text-color);
        }

        .stat { font-size: 1.4em; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #player-hp { color: var(--health-color); }
        #player-gold { color: var(--gold-color); }

        /* PLAY AREA */
        main { display: flex; flex-direction: column; flex: 1; }

        #battle-view {
            flex: 2;
            background: url('images/background2.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }
        #battle-view::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 0;
        }
        #battle-view > div {
            z-index: 1;
        }

        .shake { animation: shake 0.2s ease-in-out; }

        #squad-view, #shop-view {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
        }

        #shop-view { border-top: 1px solid rgba(255,255,255,0.1); }

        /* MONSTER CARDS */
        .slot {
            width: 130px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slot.filled { box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .slot:hover { transform: scale(1.05); border-color: var(--text-color); }

        .card {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 8px; box-sizing: border-box;
        }

        .card-image { width: 100%; height: 80px; object-fit: contain; margin: 10px 0; }
        .card-stats {
            display: flex; justify-content: space-between;
            margin-top: auto; font-weight: bold; font-size: 1.1em;
        }
        .c-atk { color: var(--gold-color); }
        .c-hp { color: var(--health-color); }

        /* INSPECTOR MODAL */
        #inspector {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            perspective: 1500px;
        }

        .inspector-inner {
            width: 450px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .inspector-front, .inspector-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backface-visibility: hidden;
            background: var(--accent-color);
            border-radius: 20px;
            border: 4px solid var(--text-color);
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .inspector-front {
            padding: 30px;
            align-items: center;
        }

        .inspector-back {
            transform: rotateY(180deg);
            padding: 30px;
            text-align: center;
            justify-content: center;
        }

        .ins-type { text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 10px; }
        .ins-image { width: 140px; height: 140px; object-fit: contain; margin: 20px auto; display: block; }
        .ins-effect { color: var(--gold-color); font-style: italic; margin: 20px 0; line-height: 1.6; }
        .ins-flavor { color: #888; font-size: 0.9em; border-top: 1px solid #444; padding-top: 15px; }

        /* CONTROLS */
        #controls {
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: 0.2s;
        }

        .btn-main { background: var(--text-color); color: white; }
        .btn-main:hover { transform: scale(1.1); filter: brightness(1.2); }
        .btn-sec { background: #444; color: white; }

        /* ANIMATIONS */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card-level {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--gold-color);
            color: black;
            font-weight: bold;
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 5px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 2em;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 500;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -100px); }
        }

        @keyframes clashRight {
            0% { transform: translateX(0); }
            50% { transform: translateX(50px) scale(1.1); z-index: 10; border-color: var(--health-color); }
            100% { transform: translateX(0); }
        }
        @keyframes clashLeft {
            0% { transform: translateX(0); }
            50% { transform: translateX(-50px) scale(1.1); z-index: 10; border-color: var(--health-color); }
            100% { transform: translateX(0); }
        }
        .clash-right { animation: clashRight 0.5s ease-in-out; }
        .clash-left { animation: clashLeft 0.5s ease-in-out; }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div class="stat" id="round-display">ROUND 1</div>
            <div class="stat" id="player-hp">❤️ 20</div>
            <div class="stat" id="player-gold">💰 15</div>
        </header>

        <main>
            <div id="battle-view" style="display: none;">
                <div id="enemy-line" style="display:flex; gap:15px; margin-bottom:40px;"></div>
                <div id="ally-line" style="display:flex; gap:15px;"></div>
            </div>

            <div id="squad-view">
                <div class="slot" onclick="inspectSlot('squad', 0, this)"></div>
                <div class="slot" onclick="inspectSlot('squad', 1, this)"></div>
                <div class="slot" onclick="inspectSlot('squad', 2, this)"></div>
                <div class="slot" onclick="inspectSlot('squad', 3, this)"></div>
                <div class="slot" onclick="inspectSlot('squad', 4, this)"></div>
            </div>

            <div id="shop-view">
                <div class="slot" onclick="inspectSlot('shop', 0, this)"></div>
                <div class="slot" onclick="inspectSlot('shop', 1, this)"></div>
                <div class="slot" onclick="inspectSlot('shop', 2, this)"></div>
            </div>
        </main>

        <footer id="controls">
            <button class="btn-sec" onclick="rerollShop()">Reroll (1💰)</button>
            <button class="btn-main" id="btn-battle" onclick="startBattle()">Fight!</button>
        </footer>
    </div>

    <div id="inspector" onclick="closeInspector()">
        <div class="inspector-inner" id="inspector-inner" onclick="event.stopPropagation()">
            <div class="inspector-front">
                <div class="card-level" id="ins-front-level" style="font-size: 1.5em; padding: 10px 20px; top: -15px; right: -15px;">LVL 1</div>
                <img id="ins-front-image" src="" alt="Monster" style="width: 100%; height: 60%; object-fit: contain; margin: auto 0;">
                <div class="card-stats" style="width: 100%; font-size: 2.5em; display: flex; justify-content: space-between; margin-top: auto;">
                    <span class="c-atk" id="ins-front-atk">⚔️ 0</span>
                    <span class="c-hp" id="ins-front-hp">🛡️ 0</span>
                </div>
            </div>
            <div class="inspector-back">
                <div id="ins-type" class="ins-type">Human</div>
                <h1 id="ins-name" style="margin: 10px 0;">Soldier</h1>
                <img id="ins-image" class="ins-image" src="" alt="Monster Inspector Image" style="margin: 10px auto; max-height: 120px;">
                <div id="ins-stats" style="font-size: 2em; font-weight: bold;">
                    <span class="c-atk" id="ins-atk">2</span> / <span class="c-hp" id="ins-hp">3</span>
                </div>
                <div id="ins-effect" class="ins-effect">TEAM: +1/+1 for each Human.</div>
                <div id="ins-flavor" class="ins-flavor">He just wants to go home and nap.</div>
                
                <div id="ins-actions" style="margin-top: auto; display:flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-main" id="ins-buy-btn">BUY (5💰)</button>
                    <button class="btn-sec" id="ins-sac-btn">SACRIFICE</button>
                    <button class="btn-sec" id="ins-merge-btn" style="background: var(--gold-color); color: black;">MERGE</button>
                    <button class="btn-sec" onclick="closeInspector()">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * MONSTER REGISTRY (The Backbone)
         */
        const MONSTER_REGISTRY = [
            { id: "m1", name: "Buff Bear", image: "images/bear-buff.png", tier: 1, type: "monster", atk: 3, hp: 4, cost: 5, 
              effectDesc: "TEAM: +1 ATK and +1 HP for every other Monster ally.", 
              flavor: "He never skips leg day or arm day." },
            
            { id: "m2", name: "Dead Hand", image: "images/deady-hand.png", tier: 1, type: "undead", atk: 4, hp: 1, cost: 5, 
              effectDesc: "AFTER: Give a random ally +3 HP when this dies.", 
              flavor: "Need a hand?" },

            { id: "m3", name: "Slime Dagger", image: "images/slime-daggers.png", tier: 1, type: "monster", atk: 2, hp: 2, cost: 5, 
              effectDesc: "SOLO: +3 ATK and +2 HP if it's the only Monster.", 
              flavor: "Sharp AND gooey." },

            { id: "m4", name: "Giant Teeth", image: "images/giant-teeth.png", tier: 2, type: "undead", atk: 4, hp: 6, cost: 8, 
              effectDesc: "TEAM: +2 HP for every other Undead ally.", 
              flavor: "Being dead is no excuse for poor dental hygiene." },

            { id: "m5", name: "Bear Shirt", image: "images/bear-shirt.png", tier: 2, type: "monster", atk: 6, hp: 4, cost: 8, 
              effectDesc: "SOLO: +4 ATK if no other monsters present.", 
              flavor: "Just a bear wearing a neat shirt." },

            { id: "m6", name: "Slime Sword", image: "images/slime-sword.png", tier: 3, type: "monster", atk: 8, hp: 8, cost: 12, 
              effectDesc: "TEAM: All Monsters gain +2/+2 at start of battle.", 
              flavor: "A legendary blade that leaves a sticky residue." },
              
            { id: "m7", name: "Buff Wolf", image: "images/wolf-buff.png", tier: 2, type: "human", atk: 5, hp: 5, cost: 8, 
              effectDesc: "TEAM: All Humans gain +1/+1 at start of battle.", 
              flavor: "Gains. That's it." },
              
            { id: "m8", name: "Wolf Jacket", image: "images/wolf-jacket.png", tier: 1, type: "human", atk: 3, hp: 2, cost: 5, 
              effectDesc: "SOLO: +2 ATK if it's the only Human.", 
              flavor: "Cool guys don't look at explosions." },
              
            { id: "m9", name: "Slime Glasses", image: "images/slime-glasses.png", tier: 1, type: "monster", atk: 1, hp: 5, cost: 5, 
              effectDesc: "TEAM: Shop items cost 1 less.", 
              flavor: "He's very smart. He reads books." },
              
            { id: "m10", name: "Living Lightning", image: "images/living-lighting.png", tier: 3, type: "undead", atk: 6, hp: 2, cost: 12, 
              effectDesc: "AFTER: Deal 3 damage to random enemy when this dies.", 
              flavor: "Pure energy, entirely shocking." }
        ];

        let state = {
            round: 1, gold: 10, hp: 20, 
            squad: [null, null, null, null, null],
            shop: [null, null, null],
            isPaused: false,
            currentlyInspecting: null
        };

        let battleData = { ally: [], enemy: [] };

        /**
         * CORE ENGINE
         */
        function init() {
            refreshShop();
            updateUI();
        }

        function refreshShop() {
            state.shop = state.shop.map(() => {
                const pool = MONSTER_REGISTRY.filter(m => m.tier <= (state.round > 3 ? 3 : state.round > 1 ? 2 : 1));
                return { ...pool[Math.floor(Math.random() * pool.length)], instId: Math.random() };
            });
            updateUI();
        }

        function rerollShop() {
            if (state.gold >= 1) {
                state.gold--;
                refreshShop();
            }
        }

        /**
         * INSPECTOR & MODAL LOGIC
         */
        function inspectSlot(type, index, element) {
            const monster = type === 'shop' ? state.shop[index] : state.squad[index];
            if (!monster) return;

            openInspector(monster, type, index, element);
        }

        function openInspector(monster, type, index, element) {
            state.currentlyInspecting = { monster, type, index };
            state.isPaused = true;

            const lvl = monster.level || 1;
            const atk = monster.cAtk !== undefined ? monster.cAtk : monster.atk;
            const hp = monster.cHp !== undefined ? monster.cHp : monster.hp;

            // Fill Front
            document.getElementById('ins-front-level').innerText = `LVL ${lvl}`;
            document.getElementById('ins-front-image').src = monster.image;
            document.getElementById('ins-front-atk').innerText = `⚔️ ${atk}`;
            document.getElementById('ins-front-hp').innerText = `🛡️ ${hp}`;

            // Fill Back
            document.getElementById('ins-type').innerText = monster.type;
            document.getElementById('ins-name').innerText = monster.name;
            document.getElementById('ins-image').src = monster.image;
            document.getElementById('ins-atk').innerText = atk;
            document.getElementById('ins-hp').innerText = hp;
            document.getElementById('ins-effect').innerText = monster.effectDesc;
            document.getElementById('ins-flavor').innerText = `"${monster.flavor}"`;

            // Buttons
            const buyBtn = document.getElementById('ins-buy-btn');
            const sacBtn = document.getElementById('ins-sac-btn');
            const mergeBtn = document.getElementById('ins-merge-btn');

            buyBtn.style.display = type === 'shop' ? 'block' : 'none';
            buyBtn.innerText = `BUY (${monster.cost}💰)`;
            buyBtn.onclick = () => buyMonster(index);

            sacBtn.style.display = type === 'squad' ? 'block' : 'none';
            sacBtn.onclick = () => sacrificeMonster(index);

            let canMerge = false;
            let mergeTargets = [];
            if (type === 'squad') {
                for (let i = 0; i < state.squad.length; i++) {
                    const sm = state.squad[i];
                    if (sm && sm.id === monster.id && (sm.level || 1) === lvl && i !== index) {
                        mergeTargets.push(i);
                    }
                }
                if (mergeTargets.length >= 2) canMerge = true;
            }
            mergeBtn.style.display = canMerge ? 'block' : 'none';
            mergeBtn.onclick = () => mergeMonster(index, mergeTargets.slice(0, 2));

            // Animation
            const inspector = document.getElementById('inspector');
            const inner = document.getElementById('inspector-inner');
            
            inspector.style.display = 'flex';
            inspector.style.opacity = '0';
            
            if (element) {
                const rect = element.getBoundingClientRect();
                const scaleX = rect.width / 450;
                const tx = (rect.left + rect.width / 2) - (window.innerWidth / 2);
                const ty = (rect.top + rect.height / 2) - (window.innerHeight / 2);
                
                inner.style.transition = 'none';
                inner.style.transform = `translate(${tx}px, ${ty}px) scale(${scaleX}) rotateY(0deg)`;
                
                // Force reflow
                void inner.offsetWidth;
            } else {
                inner.style.transition = 'none';
                inner.style.transform = 'scale(0.5) rotateY(0deg)';
                void inner.offsetWidth;
            }
            
            inspector.style.transition = 'opacity 0.3s';
            inspector.style.opacity = '1';
            
            inner.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            inner.style.transform = 'translate(0, 0) scale(1) rotateY(180deg)';
        }

        function closeInspector() {
            const inspector = document.getElementById('inspector');
            const inner = document.getElementById('inspector-inner');
            
            inspector.style.opacity = '0';
            inner.style.transform = 'scale(0.8) rotateY(180deg)';
            
            setTimeout(() => {
                inspector.style.display = 'none';
                state.isPaused = false;
                state.currentlyInspecting = null;
            }, 300);
        }

        function buyMonster(index) {
            const monster = state.shop[index];
            if (state.gold >= monster.cost) {
                const emptyIdx = state.squad.indexOf(null);
                if (emptyIdx !== -1) {
                    state.gold -= monster.cost;
                    state.squad[emptyIdx] = { ...monster, cAtk: monster.atk, cHp: monster.hp };
                    state.shop[index] = null;
                    closeInspector();
                    updateUI();
                } else { alert("Squad full!"); }
            } else { alert("Not enough gold!"); }
        }

        function sacrificeMonster(index) {
            state.squad[index] = null;
            state.gold += 2; // Refund 2 gold
            closeInspector();
            updateUI();
        }

        function mergeMonster(index, targets) {
            const mainMonster = state.squad[index];
            const m1 = state.squad[targets[0]];
            const m2 = state.squad[targets[1]];
            
            mainMonster.atk += m1.atk + m2.atk;
            mainMonster.hp += m1.hp + m2.hp;
            mainMonster.level = (mainMonster.level || 1) + 1;
            mainMonster.cAtk = mainMonster.atk;
            mainMonster.cHp = mainMonster.hp;
            
            state.squad[targets[0]] = null;
            state.squad[targets[1]] = null;
            
            closeInspector();
            updateUI();
        }

        /**
         * BATTLE SYSTEM
         */
        function startBattle() {
            if (state.squad.every(s => s === null)) return alert("Need a squad!");
            
            document.getElementById('battle-view').style.display = 'flex';
            document.getElementById('squad-view').style.display = 'none';
            document.getElementById('shop-view').style.display = 'none';
            document.getElementById('controls').style.display = 'none';

            // Clone squad and generate enemies
            battleData.ally = state.squad.filter(s => s !== null).map(s => ({ ...s, cHp: s.hp, cAtk: s.atk }));
            battleData.enemy = [0,1].map(() => {
                const m = MONSTER_REGISTRY[Math.floor(Math.random() * MONSTER_REGISTRY.length)];
                return { ...m, cHp: m.hp, cAtk: m.atk };
            });

            renderBattle();
            setTimeout(battleStep, 1000);
        }

        function battleStep() {
            if (state.isPaused) {
                setTimeout(battleStep, 100);
                return;
            }

            if (battleData.ally.length === 0 || battleData.enemy.length === 0) {
                endBattle();
                return;
            }

            const a = battleData.ally[0];
            const e = battleData.enemy[0];

            const allyFront = document.getElementById('ally-line').children[0];
            const enemyFront = document.getElementById('enemy-line').children[0];

            if (allyFront) allyFront.classList.add('clash-right');
            if (enemyFront) enemyFront.classList.add('clash-left');

            setTimeout(() => {
                // Visual Damage
                showEffect('ally-line', `-${e.cAtk}`, 'var(--health-color)');
                showEffect('enemy-line', `-${a.cAtk}`, 'var(--health-color)');
                document.getElementById('battle-view').classList.add('shake');
                setTimeout(() => document.getElementById('battle-view').classList.remove('shake'), 200);

                a.cHp -= e.cAtk;
                e.cHp -= a.cAtk;

                if (a.cHp <= 0) {
                    const dead = battleData.ally.shift();
                    if (dead.id === "m2") handleAfterDeathEffect('ally');
                }
                if (e.cHp <= 0) battleData.enemy.shift();

                renderBattle();
            }, 500);

            setTimeout(battleStep, 2500);
        }

        function handleAfterDeathEffect(side) {
            const targets = side === 'ally' ? battleData.ally : battleData.enemy;
            if (targets.length > 0) {
                targets[0].cHp += 3;
                showEffect(side === 'ally' ? 'ally-line' : 'enemy-line', `+3 HP`, 'var(--monster-color)');
            }
        }

        function endBattle() {
            const win = battleData.ally.length > 0;
            if (!win) state.hp -= 5;
            
            state.round++;
            state.gold = 10 + state.round;
            
            alert(win ? "VICTORY!" : "DEFEAT! -5 HP");
            
            document.getElementById('battle-view').style.display = 'none';
            document.getElementById('squad-view').style.display = 'flex';
            document.getElementById('shop-view').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            
            refreshShop();
            updateUI();
        }

        /**
         * VISUALS
         */
        function showEffect(containerId, text, color) {
            const container = document.getElementById(containerId);
            const target = container.children.length > 0 ? container.children[0] : container;
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.color = color;
            el.style.left = "50%";
            target.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('round-display').innerText = `ROUND ${state.round}`;
            document.getElementById('player-hp').innerText = `❤️ ${state.hp}`;
            document.getElementById('player-gold').innerText = `💰 ${state.gold}`;

            // Render Slots
            const squadSlots = document.querySelectorAll('#squad-view .slot');
            state.squad.forEach((m, i) => renderCard(squadSlots[i], m));

            const shopSlots = document.querySelectorAll('#shop-view .slot');
            state.shop.forEach((m, i) => renderCard(shopSlots[i], m));
        }

        function renderCard(slot, m) {
            slot.innerHTML = '';
            slot.classList.toggle('filled', !!m);
            if (!m) return;
            const lvl = m.level || 1;
            slot.innerHTML = `
                <div class="card-level">LVL ${lvl}</div>
                <div class="card">
                    <img src="${m.image}" alt="${m.name}" class="card-image">
                    <div class="card-stats">
                        <span class="c-atk">⚔️ ${m.atk}</span>
                        <span class="c-hp">🛡️ ${m.hp}</span>
                    </div>
                </div>
            `;
        }

        function renderBattle() {
            const allyLine = document.getElementById('ally-line');
            const enemyLine = document.getElementById('enemy-line');
            allyLine.innerHTML = ''; enemyLine.innerHTML = '';

            battleData.ally.forEach(m => {
                const div = document.createElement('div');
                div.className = 'slot filled';
                div.onclick = function() {
                    // Custom inspect for battle
                    inspectMonsterOnly(m, this);
                }
                renderCard(div, { ...m, atk: m.cAtk, hp: m.cHp });
                allyLine.appendChild(div);
            });

            battleData.enemy.forEach(m => {
                const div = document.createElement('div');
                div.className = 'slot filled';
                div.onclick = function() {
                    inspectMonsterOnly(m, this);
                }
                renderCard(div, { ...m, atk: m.cAtk, hp: m.cHp });
                enemyLine.appendChild(div);
            });
        }

        function inspectMonsterOnly(m, element) {
            openInspector(m, 'battle', null, element);
        }

        init();
    </script>
</body>
</html>
