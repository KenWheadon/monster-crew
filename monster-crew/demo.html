<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hope Project - Prologue</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --primary: #ff3e3e;
            --secondary: #fbff00;
            --accent: #00f2ff;
            --border-width: 4px;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        #game-container {
            width: 1000px;
            height: 600px;
            margin: 50px auto;
            border: var(--border-width) solid #fff;
            position: relative;
            background: #1a1a1a;
            box-shadow: 15px 15px 0px var(--primary);
        }

        /* UI ELEMENTS - NEOBRUTALISM */
        .neo-panel {
            border: var(--border-width) solid #000;
            background: #fff;
            color: #000;
            padding: 15px;
            box-shadow: 6px 6px 0px #000;
            font-weight: 900;
        }

        .header-bar {
            position: absolute; top: 0; left: 0; right: 0;
            background: var(--primary);
            padding: 10px;
            border-bottom: var(--border-width) solid #000;
            display: flex; justify-content: space-between;
            color: #000;
        }

        /* CARDS */
        .card {
            width: 140px;
            height: 190px;
            border: var(--border-width) solid #000;
            background: #fff;
            color: #000;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            margin: 10px;
            box-shadow: 4px 4px 0px #000;
        }

        .card:hover { transform: translateY(-5px); }
        .card.locked { opacity: 0.5; cursor: not-allowed; }

        .card-img {
            width: 100%; height: 60%;
            background: #ccc;
            border-bottom: var(--border-width) solid #000;
        }

        .stats {
            display: flex; justify-content: space-between;
            padding: 5px; font-size: 1.2em;
        }

        /* BATTLEFIELD */
        #battlefield {
            height: 100%; width: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .unit-row { display: flex; gap: 20px; min-height: 200px; align-items: center; }

        .boss {
            width: 250px; height: 250px;
            background: #000;
            border: 6px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            color: white; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* OVERLAYS */
        #overlay {
            position: absolute; inset: 0;
            background: #000;
            z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 50px;
        }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid var(--primary);
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--primary); } }

        .btn {
            background: var(--secondary);
            border: var(--border-width) solid #000;
            padding: 10px 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            margin-top: 20px;
        }

        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .flash { animation: flash-anim 0.2s 3; }
        @keyframes flash-anim { 0%, 100% { background: white; } 50% { background: red; } }

    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay">
        <h1 id="intro-text" class="typewriter">SHIP ARCHIVE: HARBINGER [BREACHED]</h1>
        <p id="sub-text" style="color: #666;">EXPERIMENTAL DATA RECOVERY IN PROGRESS...</p>
        <button class="btn" onclick="startTutorial()">INITIATE LINK</button>
    </div>

    <div id="shop-view" style="display:none; padding-top: 60px; height: 100%;">
        <div class="header-bar">
            <span>COMMANDER: INNER DREAD (BIO-LOGIC AI)</span>
            <span id="gold-display">BIO-MATTER: 30</span>
        </div>
        
        <div style="padding: 20px;">
            <div class="neo-panel" id="instruction" style="margin-bottom: 20px;">
                GENETIC REDUNDANCY DETECTED. ACQUIRE ALL FIRST MATE SPECIMENS.
            </div>
            
            <div id="shop-slots">
                </div>
        </div>

        <div style="position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center;">
            <button id="battle-btn" class="btn" style="display:none; background: var(--primary);" onclick="startBattle()">ENGAGE VOID RIFT</button>
        </div>
    </div>

    <div id="battlefield">
        <div class="unit-row" id="enemy-side">
            <div class="boss" id="boss-unit">
                <h2>VOID RIFT</h2>
                <div id="boss-stats" style="font-size: 2em;">40 / 40</div>
                <div style="font-size: 0.7em; color: var(--primary);">TYPE: COSMIC HORROR</div>
            </div>
        </div>
        
        <div style="height: 50px; border-top: 2px dashed #444; width: 80%; margin: 20px 0;"></div>

        <div class="unit-row" id="player-side">
            </div>
    </div>
</div>

<script>
    const state = {
        gold: 30,
        shop: [
            { id: 'h5_1', name: 'First Mate', atk: 6, hp: 14, cost: 10, type: 'Human' },
            { id: 'h5_2', name: 'First Mate', atk: 6, hp: 14, cost: 10, type: 'Human' },
            { id: 'h5_3', name: 'First Mate', atk: 6, hp: 14, cost: 10, type: 'Human' },
            { id: 'h3_1', name: 'Medical', atk: 2, hp: 7, cost: 7, type: 'Human' }
        ],
        playerBoard: [],
        step: 0
    };

    function startTutorial() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('shop-view').style.display = 'block';
        renderShop();
    }

    function renderShop() {
        const container = document.getElementById('shop-slots');
        container.innerHTML = '';
        state.shop.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-img" style="background: ${card.name === 'First Mate' ? '#ffa000' : '#29b6f6'}"></div>
                <div style="padding: 5px; font-weight: bold;">${card.name}</div>
                <div class="stats"><span>${card.atk}</span> <span>${card.hp}</span></div>
                <div style="text-align: center; font-size: 0.8em;">COST: ${card.cost}</div>
            `;
            div.onclick = () => buyCard(card);
            container.appendChild(div);
        });
    }

    function buyCard(card) {
        if (state.gold < card.cost) return;

        state.gold -= card.cost;
        state.playerBoard.push(card);
        state.shop = state.shop.filter(c => c.id !== card.id);
        
        document.getElementById('gold-display').innerText = `BIO-MATTER: ${state.gold}`;

        // Tutorial Logic: The Merge
        const firstMates = state.playerBoard.filter(c => c.name === 'First Mate');
        if (firstMates.length === 3) {
            triggerMerge();
        }

        if (state.playerBoard.some(c => c.name === 'Admiral') && state.playerBoard.some(c => c.name === 'Medical')) {
            document.getElementById('instruction').innerText = "STABILIZATION COMPLETE. NEUTRALIZE THE ANOMALY.";
            document.getElementById('battle-btn').style.display = 'block';
        }

        renderShop();
    }

    function triggerMerge() {
        state.playerBoard = state.playerBoard.filter(c => c.name !== 'First Mate');
        // The Admiral is a scripted super-unit for the demo
        const admiral = { id: 'admiral', name: 'Admiral', atk: 20, hp: 40, type: 'Human', isGold: true };
        state.playerBoard.push(admiral);
        
        document.getElementById('instruction').innerText = "GENETIC MERGE SUCCESSFUL: ADMIRAL CREATED.";
        document.getElementById('instruction').style.background = 'var(--secondary)';
    }

    function startBattle() {
        document.getElementById('shop-view').style.display = 'none';
        document.getElementById('battlefield').style.display = 'flex';
        renderBattlefield();
        setTimeout(executeBattle, 1500);
    }

    function renderBattlefield() {
        const side = document.getElementById('player-side');
        side.innerHTML = '';
        state.playerBoard.forEach(unit => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.background = unit.isGold ? 'var(--secondary)' : '#fff';
            div.innerHTML = `
                <div class="card-img" style="background: #333"></div>
                <div style="padding: 5px; font-weight: bold;">${unit.name}</div>
                <div class="stats"><span>${unit.atk}</span> <span>${unit.hp}</span></div>
            `;
            side.appendChild(div);
        });
    }

    async function executeBattle() {
        const boss = { name: "Void Rift", atk: 40, hp: 40 };
        const medical = state.playerBoard.find(u => u.name === 'Medical');
        const admiral = state.playerBoard.find(u => u.name === 'Admiral');

        // 1. Medical dies
        await attack(medical, boss);
        medical.hp = 0;
        renderBattlefield();
        
        // 2. Honor Trigger
        document.body.classList.add('flash');
        setTimeout(() => document.body.classList.remove('flash'), 200);
        admiral.hp += 3; // Honor:3 effect
        renderBattlefield();

        // 3. Final Clash
        await new Promise(r => setTimeout(r, 1000));
        await attack(admiral, boss);
        
        // The "Tie" result
        admiral.hp = 0;
        boss.hp = 0;
        document.getElementById('boss-stats').innerText = "0 / 0";
        renderBattlefield();

        setTimeout(finishIntro, 2000);
    }

    function attack(attacker, defender) {
        return new Promise(resolve => {
            // Simple visual "bump" animation logic could go here
            defender.hp -= attacker.atk;
            if(defender === boss) document.getElementById('boss-stats').innerText = `${defender.hp} / 40`;
            resolve();
        });
    }

    function finishIntro() {
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'flex';
        overlay.innerHTML = `
            <h1 class="typewriter" style="color:white">CRITICAL SYSTEM FAILURE</h1>
            <p style="color:var(--primary)">ALL SPECIMENS LOST. REBOOTING SHIP OS...</p>
            <div style="margin-top:50px; font-size: 0.8em; color: #555;">[ PHASE 2: WAKE UP, CAPTAIN VANCE ]</div>
        `;
        
        setTimeout(() => {
            overlay.style.background = 'white';
            overlay.innerHTML = `<h1 style="color:black">THE HOPE PROJECT</h1>
                                 <p style="color:black">Chapter 1: The First Seed</p>
                                 <button class="btn" onclick="location.reload()">START NEW RUN</button>`;
        }, 4000);
    }
</script>

</body>
</html>
